name: Feature Request
description: 提一个新功能建议 / Suggest a feature
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题 / Problem
      description: 你想解决什么问题？/ What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案 / Proposed Solution
      description: 你希望怎么解决？/ How would you like it to work?

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives
      description: 考虑过其他方案吗？/ Any alternatives considered?
