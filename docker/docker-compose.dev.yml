services:
  postgres:
    image: postgres:16-alpine
    container_name: nous-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nous
      POSTGRES_PASSWORD: nous
      POSTGRES_DB: nous
    ports:
      - '5432:5432'
    volumes:
      - nous-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nous -d nous']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nous-dev-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - nous-dev-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nous-dev-postgres-data:
  nous-dev-redis-data:
