<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t">
  <title id="t">Nous · 工作台 Dashboard</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7EF"/>
      <stop offset="100%" stop-color="#F2EBD8"/>
    </linearGradient>
    <linearGradient id="spark-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8E7A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6B8E7A" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="0.4"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- 顶部标题 -->
  <text x="80" y="54" font-family="Noto Serif SC, serif" font-size="11" fill="#8B8880" letter-spacing="3">WORKSPACE</text>
  <text x="80" y="82" font-family="Noto Serif SC, serif" font-size="19" fill="#1C1B19" font-weight="500">工作台</text>
  <path d="M80 94 Q 100 91, 136 94" stroke="#1C1B19" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- 右上日期/周切换 -->
  <g transform="translate(608, 56)" font-family="Noto Serif SC, serif" font-size="11">
    <rect x="0" y="0" width="54" height="22" rx="3" fill="#1C1B19"/>
    <text x="27" y="15" text-anchor="middle" fill="#FAF7EF" letter-spacing="1">本周</text>
    <text x="70" y="15" fill="#8B8880" letter-spacing="1">今天</text>
  </g>

  <!-- ═════════════ 4 张 StatCard ═════════════ -->
  <g transform="translate(80, 128)">

    <!-- 卡 1 · 今日聚焦 · 朱砂 -->
    <g>
      <rect x="0" y="0" width="148" height="104" rx="8" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.1"/>
      <!-- accent 渐晕 -->
      <rect x="0" y="0" width="148" height="38" rx="8" fill="#B8372F" fill-opacity="0.06"/>
      <text x="14" y="22" font-family="Noto Serif SC, serif" font-size="10" fill="#B8372F" letter-spacing="3">今日聚焦</text>
      <!-- 数字 -->
      <text x="14" y="64" font-family="Georgia, serif" font-size="30" fill="#1C1B19" font-weight="500">
        <tspan>3</tspan><tspan fill="#8B8880" font-size="20"> / 5</tspan>
      </text>
      <!-- 徽标 · 剩余 2 件 -->
      <rect x="14" y="78" width="68" height="16" rx="8" fill="#B8372F" fill-opacity="0.12"/>
      <text x="48" y="90" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="10" fill="#B8372F">剩余 2 件</text>
    </g>

    <!-- 卡 2 · 本周想法 · 青石 -->
    <g transform="translate(164, 0)">
      <rect x="0" y="0" width="148" height="104" rx="8" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.1"/>
      <rect x="0" y="0" width="148" height="38" rx="8" fill="#3E5871" fill-opacity="0.06"/>
      <text x="14" y="22" font-family="Noto Serif SC, serif" font-size="10" fill="#3E5871" letter-spacing="3">本周想法</text>
      <!-- 数字带 tick 动画 -->
      <text x="14" y="64" font-family="Georgia, serif" font-size="30" fill="#1C1B19" font-weight="500">
        12
        <animate attributeName="opacity" values="0.4;1" dur="1.6s" fill="freeze"/>
      </text>
      <!-- 较上周 -->
      <g transform="translate(14, 80)">
        <path d="M0 8 L 5 2 L 10 8" stroke="#6B8E7A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <text x="16" y="9" font-family="Noto Serif SC, serif" font-size="10" fill="#4A4842">较上周 +3</text>
      </g>
    </g>

    <!-- 卡 3 · 本周完成 · 青釉 + SparkLine -->
    <g transform="translate(328, 0)">
      <rect x="0" y="0" width="148" height="104" rx="8" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.1"/>
      <rect x="0" y="0" width="148" height="38" rx="8" fill="#6B8E7A" fill-opacity="0.06"/>
      <text x="14" y="22" font-family="Noto Serif SC, serif" font-size="10" fill="#6B8E7A" letter-spacing="3">本周完成</text>
      <text x="14" y="64" font-family="Georgia, serif" font-size="30" fill="#1C1B19" font-weight="500">9</text>
      <!-- SparkLine · 7 点 -->
      <g transform="translate(74, 48)">
        <!-- 渐变填充面积 -->
        <path d="M0 28 L 0 22 L 10 14 L 20 18 L 30 8 L 40 20 L 50 6 L 60 12 L 60 28 Z"
              fill="url(#spark-fill)"/>
        <!-- 折线 -->
        <path d="M0 22 L 10 14 L 20 18 L 30 8 L 40 20 L 50 6 L 60 12"
              stroke="#6B8E7A" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"
              stroke-dasharray="200" stroke-dashoffset="200">
          <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.4s" fill="freeze"/>
        </path>
        <!-- 末端朱砂圆点，带脉冲 -->
        <circle cx="60" cy="12" r="2.6" fill="#B8372F">
          <animate attributeName="r" values="2.6;4;2.6" dur="1.8s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- 卡 4 · 连续打卡 · 金泥 -->
    <g transform="translate(492, 0)">
      <rect x="0" y="0" width="148" height="104" rx="8" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.1"/>
      <rect x="0" y="0" width="148" height="38" rx="8" fill="#B8955A" fill-opacity="0.1"/>
      <text x="14" y="22" font-family="Noto Serif SC, serif" font-size="10" fill="#B8955A" letter-spacing="3">连续打卡</text>
      <text x="14" y="64" font-family="Georgia, serif" font-size="30" fill="#1C1B19" font-weight="500">
        <tspan>7</tspan><tspan fill="#8B8880" font-size="16"> 天</tspan>
      </text>
      <text x="14" y="88" font-family="Noto Serif SC, serif" font-size="10" fill="#B8955A" letter-spacing="2">节奏稳了</text>
    </g>
  </g>

  <!-- ═════════════ 主内容区 · 简化骨架 ═════════════ -->
  <g transform="translate(80, 268)" opacity="0.88">
    <!-- 左栏 · 今日聚焦卡片 -->
    <g>
      <text x="0" y="0" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880" letter-spacing="3">今日</text>
      <!-- 任务卡 1 · 已完成 -->
      <g transform="translate(0, 14)">
        <rect x="0" y="0" width="340" height="40" rx="6" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.12"/>
        <rect x="0" y="0" width="3" height="40" fill="#B8372F"/>
        <rect x="14" y="14" width="12" height="12" rx="2" fill="#6B8E7A"/>
        <path d="M16 20 L 19 23 L 24 17" stroke="#FAF7EF" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <text x="34" y="24" font-family="Noto Serif SC, serif" font-size="12" fill="#4A4842" text-decoration="line-through">README 换成克制的 INTP 风</text>
      </g>
      <!-- 任务 2 · 进行中 -->
      <g transform="translate(0, 60)">
        <rect x="0" y="0" width="340" height="40" rx="6" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.12"/>
        <rect x="0" y="0" width="3" height="40" fill="#B8372F"/>
        <rect x="14" y="14" width="12" height="12" rx="2" fill="none" stroke="#1C1B19" stroke-opacity="0.6"/>
        <text x="34" y="24" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">打磨 6 张 SVG 到对齐项目现状</text>
        <!-- 番茄钟小印 -->
        <g transform="translate(294, 12)">
          <circle cx="8" cy="8" r="8" fill="#B8372F" fill-opacity="0.12"/>
          <text x="8" y="11" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="9" fill="#B8372F">25</text>
        </g>
      </g>
      <!-- 任务 3 · 待做 -->
      <g transform="translate(0, 106)">
        <rect x="0" y="0" width="340" height="40" rx="6" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.12"/>
        <rect x="0" y="0" width="3" height="40" fill="#B8955A"/>
        <rect x="14" y="14" width="12" height="12" rx="2" fill="none" stroke="#1C1B19" stroke-opacity="0.6"/>
        <text x="34" y="24" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">接回 SedimentPanel 到工作台底部</text>
      </g>
    </g>

    <!-- 右栏 · 最近复盘摘要 -->
    <g transform="translate(380, 0)">
      <text x="0" y="0" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880" letter-spacing="3">最近一条洞察</text>
      <rect x="0" y="14" width="260" height="132" rx="6" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.12"/>
      <!-- 引号 -->
      <text x="14" y="44" font-family="Noto Serif SC, serif" font-size="22" fill="#B8955A" opacity="0.6">"</text>
      <text x="28" y="42" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">先收口，再开新的。</text>
      <text x="28" y="60" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">想法不怕多，</text>
      <text x="28" y="78" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">怕都停在一半。</text>
      <!-- 日期 -->
      <text x="14" y="124" font-family="system-ui" font-size="10" fill="#8B8880">· 上周日的周复盘</text>
    </g>
  </g>

  <!-- 朱砂印 "算" -->
  <g transform="translate(690, 74) rotate(-7)" filter="url(#blur-sm)">
    <rect x="0" y="0" width="42" height="42" rx="3" fill="#B8372F" opacity="0.93"/>
    <text x="21" y="30" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" font-weight="500" fill="#FAF7EF">算</text>
  </g>
</svg>
