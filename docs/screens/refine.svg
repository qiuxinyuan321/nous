<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t">
  <title id="t">Nous · 苏格拉底对话</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7EF"/>
      <stop offset="100%" stop-color="#F2EBD8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- 阶段进度条 -->
  <g transform="translate(80, 40)">
    <text x="0" y="0" font-family="Noto Serif SC, serif" font-size="13" fill="#8B8880" letter-spacing="4">阶段</text>
    <g transform="translate(0, 16)">
      <!-- intent (过) -->
      <g>
        <circle cx="12" cy="12" r="12" fill="#1C1B19"/>
        <path d="M7 12 L11 16 L17 9" stroke="#FAF7EF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="12" y="42" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="11" fill="#4A4842">意图</text>
      </g>
      <line x1="24" y1="12" x2="90" y2="12" stroke="#1C1B19" stroke-width="1.2"/>
      <!-- detail (当前 · 带 ping 脉冲) -->
      <g transform="translate(90, 0)">
        <!-- ping 脉冲外圈 -->
        <circle cx="12" cy="12" r="12" fill="#B8372F" opacity="0.35">
          <animate attributeName="r" values="12;20;12" dur="1.8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.45;0;0.45" dur="1.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="12" cy="12" r="12" fill="#B8372F"/>
        <circle cx="12" cy="12" r="4" fill="#FAF7EF"/>
        <text x="12" y="42" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="11" font-weight="600" fill="#1C1B19">细节</text>
      </g>
      <line x1="114" y1="12" x2="180" y2="12" stroke="#8B8880" stroke-width="1" stroke-dasharray="4 4"/>
      <!-- boundary -->
      <g transform="translate(180, 0)">
        <circle cx="12" cy="12" r="12" fill="none" stroke="#8B8880" stroke-width="1.2"/>
        <text x="12" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B8880">3</text>
        <text x="12" y="42" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="11" fill="#8B8880">边界</text>
      </g>
      <line x1="204" y1="12" x2="270" y2="12" stroke="#8B8880" stroke-width="1" stroke-dasharray="4 4"/>
      <!-- ready -->
      <g transform="translate(270, 0)">
        <circle cx="12" cy="12" r="12" fill="none" stroke="#8B8880" stroke-width="1.2"/>
        <text x="12" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B8880">4</text>
        <text x="12" y="42" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="11" fill="#8B8880">就绪</text>
      </g>
    </g>
  </g>

  <!-- Assistant 气泡 1 -->
  <g transform="translate(80, 130)">
    <circle cx="14" cy="14" r="14" fill="#1C1B19"/>
    <text x="14" y="19" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#FAF7EF">思</text>
    <g transform="translate(40, 0)">
      <rect x="0" y="0" width="540" height="56" rx="8" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.1"/>
      <text x="16" y="23" font-family="Noto Serif SC, serif" font-size="14" fill="#1C1B19">
        成品的第一版,用户看到的第一个界面 / 拿到的第一个东西,
      </text>
      <text x="16" y="42" font-family="Noto Serif SC, serif" font-size="14" fill="#1C1B19">
        是什么样的?
      </text>
    </g>
  </g>

  <!-- User 气泡 -->
  <g transform="translate(210, 214)">
    <rect x="0" y="0" width="510" height="50" rx="8" fill="#1C1B19"/>
    <text x="16" y="21" font-family="Noto Serif SC, serif" font-size="14" fill="#FAF7EF">
      一个命令面板,按 ⌘K 唤起,写一句话就存。
    </text>
    <text x="16" y="39" font-family="Noto Serif SC, serif" font-size="14" fill="#FAF7EF" opacity="0.85">
      不用分类、不用标签。
    </text>
  </g>

  <!-- Assistant 回应 (流式) -->
  <g transform="translate(80, 286)">
    <circle cx="14" cy="14" r="14" fill="#1C1B19"/>
    <text x="14" y="19" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#FAF7EF">思</text>
    <g transform="translate(40, 0)">
      <rect x="0" y="0" width="540" height="78" rx="8" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.1"/>
      <text x="16" y="24" font-family="Noto Serif SC, serif" font-size="14" fill="#1C1B19">
        那如果只能保留一个功能,留哪个?是输入的零摩擦,
      </text>
      <text x="16" y="43" font-family="Noto Serif SC, serif" font-size="14" fill="#1C1B19">
        还是后续 AI 帮你把它变成可执行方案?
      </text>
      <!-- 流式光标 -->
      <rect x="404" y="49" width="2" height="16" fill="#1C1B19">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- 底栏: 快捷回复 -->
  <g transform="translate(120, 408)">
    <text x="0" y="0" font-family="Noto Serif SC, serif" font-size="11" fill="#8B8880" letter-spacing="2">快速回答</text>
    <g transform="translate(0, 14)">
      <rect x="0" y="0" width="108" height="26" rx="13" fill="none" stroke="#1C1B19" stroke-opacity="0.6"/>
      <text x="54" y="17" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">零摩擦输入</text>
      <rect x="118" y="0" width="102" height="26" rx="13" fill="none" stroke="#1C1B19" stroke-opacity="0.6"/>
      <text x="169" y="17" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">落地能力</text>
      <rect x="230" y="0" width="90" height="26" rx="13" fill="none" stroke="#1C1B19" stroke-opacity="0.6"/>
      <text x="275" y="17" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">都要</text>
    </g>
  </g>

  <!-- 朱砂印: "问" -->
  <g transform="translate(690, 50) rotate(-7)">
    <rect x="0" y="0" width="42" height="42" rx="3" fill="#B8372F" opacity="0.93"/>
    <text x="21" y="30" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" font-weight="500" fill="#FAF7EF">问</text>
  </g>
</svg>
