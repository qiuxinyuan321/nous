<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t">
  <title id="t">Nous · ⌘K 零摩擦捕获</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7EF"/>
      <stop offset="100%" stop-color="#F2EBD8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-opacity="0.22"/>
    </filter>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="0.4"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- 后面隐约的桌面 (Inbox 骨架) -->
  <g opacity="0.35">
    <rect x="40" y="48" width="240" height="18" rx="3" fill="#1C1B19" opacity="0.55"/>
    <rect x="40" y="80" width="140" height="10" rx="2" fill="#8B8880"/>
    <rect x="40" y="104" width="720" height="1" fill="#8B8880" opacity="0.45"/>
    <!-- 卡片骨架 -->
    <g>
      <rect x="40" y="130" width="350" height="88" rx="6" fill="#FAF7EF" stroke="#8B8880" stroke-opacity="0.35"/>
      <rect x="56" y="148" width="180" height="10" rx="2" fill="#4A4842" opacity="0.65"/>
      <rect x="56" y="168" width="260" height="7" rx="2" fill="#8B8880"/>
      <rect x="56" y="182" width="220" height="7" rx="2" fill="#8B8880"/>
    </g>
    <g>
      <rect x="410" y="130" width="350" height="88" rx="6" fill="#FAF7EF" stroke="#8B8880" stroke-opacity="0.35"/>
      <rect x="426" y="148" width="200" height="10" rx="2" fill="#4A4842" opacity="0.65"/>
      <rect x="426" y="168" width="180" height="7" rx="2" fill="#8B8880"/>
    </g>
    <g>
      <rect x="40" y="234" width="350" height="88" rx="6" fill="#FAF7EF" stroke="#8B8880" stroke-opacity="0.35"/>
      <rect x="56" y="252" width="140" height="10" rx="2" fill="#4A4842" opacity="0.65"/>
      <rect x="56" y="272" width="240" height="7" rx="2" fill="#8B8880"/>
    </g>
  </g>

  <!-- 背景毛玻璃蒙层 -->
  <rect width="800" height="500" fill="#FAF7EF" opacity="0.45"/>

  <!-- 命令面板 -->
  <g filter="url(#shadow)">
    <rect x="150" y="120" width="500" height="250" rx="6" fill="#F2EBD8" stroke="#1C1B19" stroke-opacity="0.22"/>

    <!-- 输入区 -->
    <text x="180" y="175" font-family="Noto Serif SC, serif" font-size="22" fill="#1C1B19">
      开源一套 AI 翻译器,给 INTP 把想法落地
    </text>
    <rect x="180" y="192" width="2" height="24" fill="#1C1B19">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <text x="180" y="232" font-family="Noto Serif SC, serif" font-size="14" fill="#8B8880">
      脑子里的东西,先放进来……
    </text>

    <!-- 分割 -->
    <line x1="180" y1="285" x2="620" y2="285" stroke="#1C1B19" stroke-opacity="0.12"/>

    <!-- 底栏: 麦克风 + kbd + 落笔 -->
    <!-- 麦克风图标 -->
    <g transform="translate(185, 316)">
      <circle r="14" fill="none" stroke="#8B8880" stroke-width="1"/>
      <g transform="translate(-6,-7)" stroke="#4A4842" stroke-width="1.5" fill="none" stroke-linecap="round">
        <rect x="3.5" y="1" width="5" height="7.5" rx="2.5" fill="#4A4842" fill-opacity="0.15"/>
        <path d="M1 9 A 5 5 0 0 0 11 9 M6 14 L6 17 M3 17 L9 17"/>
      </g>
    </g>
    <text x="215" y="320" font-family="system-ui" font-size="11" fill="#8B8880">或按麦克风说话</text>

    <!-- kbd -->
    <g transform="translate(370, 308)">
      <rect x="0" y="0" width="44" height="18" rx="3" fill="none" stroke="#8B8880" stroke-opacity="0.6"/>
      <text x="22" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#4A4842">Enter</text>
      <text x="52" y="13" font-family="system-ui" font-size="11" fill="#8B8880">落笔</text>
      <rect x="90" y="0" width="36" height="18" rx="3" fill="none" stroke="#8B8880" stroke-opacity="0.6"/>
      <text x="108" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#4A4842">Esc</text>
      <text x="132" y="13" font-family="system-ui" font-size="11" fill="#8B8880">离开</text>
    </g>

    <!-- 落笔按钮 -->
    <g transform="translate(540, 306)">
      <rect x="0" y="0" width="70" height="22" rx="3" fill="#1C1B19"/>
      <text x="35" y="16" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#FAF7EF">落笔</text>
    </g>
  </g>

  <!-- 朱砂印: "捕" 章 -->
  <g transform="translate(628, 100) rotate(-8)" filter="url(#blur-sm)">
    <rect x="0" y="0" width="48" height="48" rx="3" fill="#B8372F" opacity="0.93"/>
    <text x="24" y="34" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="22" font-weight="500" fill="#FAF7EF">捕</text>
  </g>
</svg>
