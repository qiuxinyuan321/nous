<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t">
  <title id="t">Nous · ⌘K 命令面板 · cmdk 三模式</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7EF"/>
      <stop offset="100%" stop-color="#F2EBD8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-opacity="0.22"/>
    </filter>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="0.4"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- 后面隐约的桌面 (被毛玻璃盖住) -->
  <g opacity="0.28">
    <rect x="40" y="48" width="240" height="18" rx="3" fill="#1C1B19" opacity="0.55"/>
    <rect x="40" y="80" width="140" height="10" rx="2" fill="#8B8880"/>
    <rect x="40" y="104" width="720" height="1" fill="#8B8880" opacity="0.45"/>
    <g>
      <rect x="40" y="130" width="350" height="76" rx="6" fill="#FAF7EF" stroke="#8B8880" stroke-opacity="0.35"/>
      <rect x="56" y="146" width="180" height="10" rx="2" fill="#4A4842" opacity="0.65"/>
      <rect x="56" y="166" width="260" height="7" rx="2" fill="#8B8880"/>
    </g>
    <g>
      <rect x="410" y="130" width="350" height="76" rx="6" fill="#FAF7EF" stroke="#8B8880" stroke-opacity="0.35"/>
      <rect x="426" y="146" width="200" height="10" rx="2" fill="#4A4842" opacity="0.65"/>
      <rect x="426" y="166" width="180" height="7" rx="2" fill="#8B8880"/>
    </g>
  </g>

  <rect width="800" height="500" fill="#FAF7EF" opacity="0.48"/>

  <!-- ═════════════ 命令面板 ═════════════ -->
  <g filter="url(#shadow)" transform="translate(130, 56)">
    <rect x="0" y="0" width="540" height="388" rx="8" fill="#F2EBD8" stroke="#1C1B19" stroke-opacity="0.22"/>

    <!-- 输入区 -->
    <text x="28" y="44" font-family="Noto Serif SC, serif" font-size="18" fill="#1C1B19">记一个想法,或输入指令</text>
    <rect x="268" y="26" width="2" height="22" fill="#1C1B19">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <!-- 模式切换指示 (右上) -->
    <g transform="translate(454, 22)">
      <rect x="0" y="0" width="62" height="22" rx="3" fill="#1C1B19"/>
      <text x="31" y="15" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="11" fill="#FAF7EF" letter-spacing="1">命令</text>
    </g>
    <line x1="0" y1="64" x2="540" y2="64" stroke="#1C1B19" stroke-opacity="0.12"/>

    <!-- ═══ 分组 1 · 想法 ═══ -->
    <g transform="translate(0, 84)">
      <text x="28" y="0" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880" letter-spacing="3">想法</text>
      <!-- item · 选中 -->
      <g transform="translate(14, 10)">
        <rect x="0" y="0" width="512" height="28" rx="4" fill="#1C1B19" fill-opacity="0.07"/>
        <circle cx="22" cy="14" r="3" fill="#B8955A"/>
        <text x="36" y="18" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">开源一个给想得多的人用的工具</text>
        <text x="330" y="18" font-family="system-ui" font-size="10" fill="#8B8880">已规划 · 5 任务</text>
        <!-- ↵ 提示 -->
        <g transform="translate(488, 6)">
          <rect x="0" y="0" width="16" height="16" rx="3" stroke="#8B8880" stroke-opacity="0.5" fill="none"/>
          <text x="8" y="12" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#4A4842">↵</text>
        </g>
      </g>
      <!-- item 2 -->
      <g transform="translate(14, 42)">
        <circle cx="22" cy="14" r="3" fill="#3E5871"/>
        <text x="36" y="18" font-family="Noto Serif SC, serif" font-size="13" fill="#4A4842">周末写一篇 Simple Made Easy 的笔记</text>
        <text x="340" y="18" font-family="system-ui" font-size="10" fill="#8B8880">对话中</text>
      </g>
      <!-- item 3 -->
      <g transform="translate(14, 74)">
        <circle cx="22" cy="14" r="3" fill="#8B8880"/>
        <text x="36" y="18" font-family="Noto Serif SC, serif" font-size="13" fill="#4A4842">给阳台换一张椅子</text>
        <text x="340" y="18" font-family="system-ui" font-size="10" fill="#8B8880">未整理</text>
      </g>
    </g>

    <!-- ═══ 分组 2 · 笔记 · 服务端 fuzzy ═══ -->
    <g transform="translate(0, 200)">
      <text x="28" y="0" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880" letter-spacing="3">笔记</text>
      <text x="72" y="0" font-family="system-ui" font-size="9" fill="#8B8880">防抖 300ms · 服务端 fuzzy</text>
      <g transform="translate(14, 10)">
        <text x="22" y="18" font-family="Noto Serif SC, serif" font-size="13" fill="#4A4842">Reader note · 苏格拉底式追问的四个阶段</text>
        <text x="420" y="18" font-family="system-ui" font-size="10" fill="#8B8880">2 小时前</text>
      </g>
      <g transform="translate(14, 36)">
        <text x="22" y="18" font-family="Noto Serif SC, serif" font-size="13" fill="#4A4842">Meeting · 下周 Nous 1.0 发布怎么收口</text>
        <text x="420" y="18" font-family="system-ui" font-size="10" fill="#8B8880">昨天</text>
      </g>
    </g>

    <!-- ═══ 分组 3 · 操作 / 跳转 并列 ═══ -->
    <g transform="translate(0, 282)">
      <!-- 操作 -->
      <g>
        <text x="28" y="0" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880" letter-spacing="3">操作</text>
        <g transform="translate(14, 10)">
          <text x="22" y="18" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">录音捕获</text>
          <text x="22" y="40" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">切换主题</text>
          <text x="22" y="62" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">今日聚焦</text>
        </g>
      </g>
      <!-- 跳转 -->
      <g transform="translate(280, 0)">
        <text x="0" y="0" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880" letter-spacing="3">跳转</text>
        <g transform="translate(0, 10)">
          <text x="0" y="18" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">工作台 · 收件箱 · 今日</text>
          <text x="0" y="40" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">笔记 · 复盘 · 记忆</text>
          <text x="0" y="62" font-family="Noto Serif SC, serif" font-size="13" fill="#1C1B19">知识图谱 · 设置</text>
        </g>
      </g>
    </g>

    <!-- 底栏 kbd -->
    <line x1="0" y1="356" x2="540" y2="356" stroke="#1C1B19" stroke-opacity="0.12"/>
    <g transform="translate(24, 368)">
      <!-- ⌘K hint -->
      <g>
        <rect x="0" y="0" width="30" height="16" rx="3" stroke="#8B8880" stroke-opacity="0.55" fill="none"/>
        <text x="15" y="12" text-anchor="middle" font-size="10" fill="#4A4842"><tspan font-family="'Segoe UI Symbol', 'Apple Symbols', system-ui">⌘</tspan><tspan font-family="JetBrains Mono, monospace">K</tspan></text>
        <text x="38" y="12" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880">唤起</text>
      </g>
      <g transform="translate(110, 0)">
        <rect x="0" y="0" width="36" height="16" rx="3" stroke="#8B8880" stroke-opacity="0.55" fill="none"/>
        <text x="18" y="12" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#4A4842">↑ ↓</text>
        <text x="54" y="12" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880">选择</text>
      </g>
      <g transform="translate(206, 0)">
        <rect x="0" y="0" width="32" height="16" rx="3" stroke="#8B8880" stroke-opacity="0.55" fill="none"/>
        <text x="16" y="12" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#4A4842">↵</text>
        <text x="42" y="12" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880">执行</text>
      </g>
      <g transform="translate(298, 0)">
        <rect x="0" y="0" width="28" height="16" rx="3" stroke="#8B8880" stroke-opacity="0.55" fill="none"/>
        <text x="14" y="12" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#4A4842">Esc</text>
        <text x="42" y="12" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880">离开</text>
      </g>
      <!-- cmdk 标识 -->
      <text x="460" y="12" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#8B8880" font-style="italic">cmdk</text>
    </g>
  </g>

  <!-- 朱砂印 "捕" -->
  <g transform="translate(626, 38) rotate(-8)" filter="url(#blur-sm)">
    <rect x="0" y="0" width="46" height="46" rx="3" fill="#B8372F" opacity="0.93"/>
    <text x="23" y="32" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="22" font-weight="500" fill="#FAF7EF">捕</text>
  </g>
</svg>
