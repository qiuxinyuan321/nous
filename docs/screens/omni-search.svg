<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" role="img" aria-labelledby="t">
  <title id="t">Nous · Omni-Search 跨实体搜索</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7EF"/>
      <stop offset="100%" stop-color="#F2EBD8"/>
    </linearGradient>
    <filter id="glass"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- 背景工作台虚化（只画结构 · 零真内容） -->
  <rect width="880" height="500" fill="url(#bg)"/>
  <g opacity="0.22" filter="url(#glass)">
    <rect x="60" y="60" width="760" height="40" rx="6" fill="#1C1B19" fill-opacity="0.04"/>
    <rect x="60" y="130" width="160" height="70" rx="6" fill="#1C1B19" fill-opacity="0.06"/>
    <rect x="236" y="130" width="160" height="70" rx="6" fill="#1C1B19" fill-opacity="0.06"/>
    <rect x="412" y="130" width="160" height="70" rx="6" fill="#1C1B19" fill-opacity="0.06"/>
    <rect x="588" y="130" width="160" height="70" rx="6" fill="#1C1B19" fill-opacity="0.06"/>
    <rect x="60" y="220" width="370" height="180" rx="6" fill="#1C1B19" fill-opacity="0.04"/>
    <rect x="450" y="220" width="370" height="180" rx="6" fill="#1C1B19" fill-opacity="0.04"/>
  </g>

  <!-- 命令面板主卡 -->
  <g transform="translate(140, 60)">
    <!-- 卡片阴影 -->
    <rect x="4" y="6" width="600" height="400" rx="10" fill="#1C1B19" fill-opacity="0.1"/>
    <!-- 卡片本体 -->
    <rect x="0" y="0" width="600" height="400" rx="10" fill="#FAF7EF" stroke="#1C1B19" stroke-opacity="0.14"/>

    <!-- 顶部面包屑 -->
    <text x="22" y="28" font-family="Noto Serif SC, serif" font-size="10" fill="#8B8880" letter-spacing="2">OMNI-SEARCH · 跨 5 类</text>
    <text x="560" y="28" font-family="system-ui" font-size="9" fill="#8B8880" text-anchor="end">⌘⇧K</text>

    <!-- 搜索框 -->
    <g transform="translate(22, 42)">
      <rect x="0" y="0" width="556" height="44" rx="6" fill="#F2EBD8" stroke="#1C1B19" stroke-opacity="0.1"/>
      <circle cx="20" cy="22" r="6" fill="none" stroke="#8B8880" stroke-width="1.4"/>
      <line x1="25" y1="27" x2="30" y2="32" stroke="#8B8880" stroke-width="1.4" stroke-linecap="round"/>
      <text x="42" y="27" font-family="Noto Serif SC, serif" font-size="14" fill="#1C1B19">留白</text>
      <rect x="66" y="16" width="2" height="14" fill="#B8372F">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
      <text x="530" y="27" font-family="system-ui" font-size="10" fill="#8B8880">12 命中</text>
    </g>

    <!-- 过滤 chips -->
    <g transform="translate(22, 100)" font-family="Noto Serif SC, serif" font-size="10">
      <g>
        <rect x="0" y="0" width="42" height="20" rx="10" fill="#1C1B19"/>
        <text x="21" y="13" text-anchor="middle" fill="#FAF7EF" letter-spacing="1">全部</text>
      </g>
      <g transform="translate(50, 0)">
        <rect x="0" y="0" width="44" height="20" rx="10" fill="none" stroke="#1C1B19" stroke-opacity="0.2"/>
        <text x="22" y="13" text-anchor="middle" fill="#4A4842" letter-spacing="1">想法 4</text>
      </g>
      <g transform="translate(100, 0)">
        <rect x="0" y="0" width="44" height="20" rx="10" fill="none" stroke="#1C1B19" stroke-opacity="0.2"/>
        <text x="22" y="13" text-anchor="middle" fill="#4A4842" letter-spacing="1">笔记 3</text>
      </g>
      <g transform="translate(150, 0)">
        <rect x="0" y="0" width="44" height="20" rx="10" fill="none" stroke="#1C1B19" stroke-opacity="0.2"/>
        <text x="22" y="13" text-anchor="middle" fill="#4A4842" letter-spacing="1">消息 3</text>
      </g>
      <g transform="translate(200, 0)">
        <rect x="0" y="0" width="44" height="20" rx="10" fill="none" stroke="#1C1B19" stroke-opacity="0.2"/>
        <text x="22" y="13" text-anchor="middle" fill="#4A4842" letter-spacing="1">复盘 1</text>
      </g>
      <g transform="translate(250, 0)">
        <rect x="0" y="0" width="44" height="20" rx="10" fill="none" stroke="#1C1B19" stroke-opacity="0.2"/>
        <text x="22" y="13" text-anchor="middle" fill="#4A4842" letter-spacing="1">记忆 1</text>
      </g>
    </g>

    <!-- 结果列表 -->
    <g transform="translate(22, 136)">
      <!-- 结果 1 · 想法 · 高亮选中 -->
      <g>
        <rect x="0" y="0" width="556" height="44" rx="4" fill="#B8372F" fill-opacity="0.05"/>
        <rect x="0" y="0" width="3" height="44" fill="#B8372F"/>
        <text x="14" y="18" font-family="Noto Serif SC, serif" font-size="9" fill="#B8372F" letter-spacing="2">想法</text>
        <text x="14" y="34" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">INTP 审美的边界 · <tspan fill="#B8372F" font-weight="500">留白</tspan> 是不是一种门槛</text>
        <text x="540" y="27" font-family="system-ui" font-size="9" fill="#8B8880" text-anchor="end">0.94</text>
      </g>

      <!-- 结果 2 · 笔记 -->
      <g transform="translate(0, 50)">
        <rect x="0" y="0" width="556" height="44" rx="4" fill="none"/>
        <rect x="0" y="0" width="3" height="44" fill="#6B8E7A"/>
        <text x="14" y="18" font-family="Noto Serif SC, serif" font-size="9" fill="#6B8E7A" letter-spacing="2">笔记</text>
        <text x="14" y="34" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">构图三比例 · 为什么 <tspan fill="#B8372F" font-weight="500">留白</tspan> 是先手而不是修饰</text>
        <text x="540" y="27" font-family="system-ui" font-size="9" fill="#8B8880" text-anchor="end">0.89</text>
      </g>

      <!-- 结果 3 · 苏格拉底 回应 -->
      <g transform="translate(0, 100)">
        <rect x="0" y="0" width="556" height="44" rx="4" fill="none"/>
        <rect x="0" y="0" width="3" height="44" fill="#3E5871"/>
        <text x="14" y="18" font-family="Noto Serif SC, serif" font-size="9" fill="#3E5871" letter-spacing="2">苏格拉底 回应</text>
        <text x="14" y="34" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19"><tspan fill="#B8372F" font-weight="500">留白</tspan> 是读者的呼吸 · 也是对读者的信任</text>
        <text x="540" y="27" font-family="system-ui" font-size="9" fill="#8B8880" text-anchor="end">0.86</text>
      </g>

      <!-- 结果 4 · 复盘 -->
      <g transform="translate(0, 150)">
        <rect x="0" y="0" width="556" height="44" rx="4" fill="none"/>
        <rect x="0" y="0" width="3" height="44" fill="#B8955A"/>
        <text x="14" y="18" font-family="Noto Serif SC, serif" font-size="9" fill="#B8955A" letter-spacing="2">复盘 · 上周日</text>
        <text x="14" y="34" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">少即是多 · 从「装饰焦虑」到「<tspan fill="#B8372F" font-weight="500">留白</tspan> 自觉」</text>
        <text x="540" y="27" font-family="system-ui" font-size="9" fill="#8B8880" text-anchor="end">0.82</text>
      </g>

      <!-- 结果 5 · 记忆 -->
      <g transform="translate(0, 200)">
        <rect x="0" y="0" width="556" height="44" rx="4" fill="none"/>
        <rect x="0" y="0" width="3" height="44" fill="#8B8880" stroke-dasharray="2 2"/>
        <text x="14" y="18" font-family="Noto Serif SC, serif" font-size="9" fill="#8B8880" letter-spacing="2">记忆 · 已沉淀</text>
        <text x="14" y="34" font-family="Noto Serif SC, serif" font-size="12" fill="#1C1B19">「先减，再加」— 关于 <tspan fill="#B8372F" font-weight="500">留白</tspan> 的核心原则</text>
        <text x="540" y="27" font-family="system-ui" font-size="9" fill="#8B8880" text-anchor="end">0.78</text>
      </g>
    </g>

    <!-- 底部 hint -->
    <g transform="translate(22, 370)" font-family="system-ui" font-size="10" fill="#8B8880">
      <text x="0" y="12">↑↓ 选择</text>
      <text x="72" y="12">⏎ 打开</text>
      <text x="140" y="12">⌘K 切换视图</text>
      <text x="540" y="12" text-anchor="end">esc 关闭</text>
    </g>
  </g>
</svg>
